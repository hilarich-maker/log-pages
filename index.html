<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log Apps Support</title>
  <style>
    :root {
      --text: #1a1a1a;
      --muted: #555;
      --border: #ddd;
      --bg: #fafafa;
      --link: #0b57d0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.05rem;
      line-height: 1.65;
      color: var(--text);
      background: var(--bg);
    }
    main {
      max-width: 42rem;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }
    h1 {
      font-size: 1.85rem;
      font-weight: 700;
      line-height: 1.25;
      margin: 0 0 0.75rem;
    }
    p { margin: 0 0 1rem; }
    ul {
      padding-left: 1.25rem;
      margin: 1.25rem 0 0;
    }
    li { margin-bottom: 0.5rem; }
    a { color: var(--link); }
    .muted {
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Log Apps Support</h1>
    <p>
      Support and privacy pages for Log apps.
    </p>
    <p class="muted">
      These pages are for store listings and user support. They are not
      legal advice.
    </p>

    <ul>
      <li>
        <a href="homelog/privacy-policy.html">HomeLog Privacy Policy</a>
      </li>
      <li>
        <a href="homelog/support.html">HomeLog Support</a>
      </li>
    </ul>
  </main>
</body>
</html>
